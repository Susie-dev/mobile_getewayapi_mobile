<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no, width=device-width">
    <title>冷链运输全局监控</title>
    <style>
        html, body, #container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* 自定义车辆标签样式 */
        .truck-marker {
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .truck-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
        .temp-normal { color: #00b300; font-weight: bold; }
        .temp-alert { color: #ff0000; font-weight: bold; animation: blink 1s infinite; }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
    <!-- 请注意：这里的 key 是一把测试 key，实际商用请替换为您自己在高德开放平台申请的 Web端(JS API) Key -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=62f5f142271df07d10e53a31c510db9f"></script>
</head>
<body>
<div id="container"></div>

<script>
    // 1. 初始化地图，中心点设为北京
    var map = new AMap.Map('container', {
        zoom: 11,
        center: [116.397428, 39.90923], 
        mapStyle: 'amap://styles/normal' // 可选黑暗模式 'amap://styles/dark'
    });

    // 存储所有车辆的 Marker (key 为 order_id)
    var truckMarkers = {};
    var playbackPolylines = {}; // 存储历史轨迹的红线

    // QML 调用的 JavaScript 接口：播放历史轨迹
    function playHistory(jsonStr) {
        try {
            var response = JSON.parse(jsonStr);
            var orderId = response.order_id;
            var dataArr = response.data;

            if (!dataArr || dataArr.length === 0) {
                alert("未查询到该订单的历史轨迹！");
                return;
            }

            // 1. 提取所有经纬度点，并绘制红线
            var path = [];
            for (var i = 0; i < dataArr.length; i++) {
                path.push([dataArr[i].longitude, dataArr[i].latitude]);
            }

            // 如果之前有画过这条线，先清除
            if (playbackPolylines[orderId]) {
                map.remove(playbackPolylines[orderId]);
            }

            var polyline = new AMap.Polyline({
                path: path,
                isOutline: true,
                outlineColor: '#ffeeff',
                borderWeight: 2,
                strokeColor: "#ff0000", 
                strokeOpacity: 0.8,
                strokeWeight: 6,
                strokeStyle: "solid",
                lineJoin: 'round',
                lineCap: 'round',
                zIndex: 50,
            });
            polyline.setMap(map);
            playbackPolylines[orderId] = polyline;

            // 2. 视角自适应到轨迹范围
            map.setFitView([polyline]);

            // 3. 创建一个小车沿着红线跑
            // 为了不和实时车辆冲突，我们在回放时创建一个专属的幽灵车
            var markerContent = `
                <div class="truck-marker">
                    <div class="truck-icon">🚚</div>
                    <div>回放: ${orderId}</div>
                    <div style="color:#ff0000; font-weight:bold;">历史轨迹重现</div>
                </div>
            `;
            
            var playbackMarker = new AMap.Marker({
                map: map,
                position: path[0],
                content: markerContent,
                offset: new AMap.Pixel(-50, -50),
                autoRotation: true
            });

            // 使用高德提供的轨迹回放动画 (需要引入 AMap.MoveAnimation 插件，但高德2.0自带 moveTo)
            // 我们通过递归调用 moveTo 实现连贯的动画
            var currentIndex = 0;
            function moveNext() {
                if (currentIndex >= path.length - 1) {
                    // 跑完了，两秒后销毁幽灵车
                    setTimeout(function() { map.remove(playbackMarker); }, 2000);
                    return;
                }
                currentIndex++;
                var nextPos = path[currentIndex];
                playbackMarker.moveTo(nextPos, {
                    duration: 500, // 每段路0.5秒
                    autoRotation: true
                });
                
                // 监听移动完成事件，继续跑下一段
                playbackMarker.on('moveend', function() {
                    playbackMarker.off('moveend'); // 移除监听防止重复触发
                    moveNext();
                });
            }
            
            moveNext();

        } catch (e) {
            console.error("解析历史数据失败: ", e);
        }
    }

    // 2. QML 调用的 JavaScript 接口：更新车辆位置和状态
    // jsonStr 是从后端传来的标准 JSON 字符串
    function updateTruckData(jsonStr) {
        try {
            var data = JSON.parse(jsonStr);
            var orderId = data.order_id;
            var lng = data.location.longitude;
            var lat = data.location.latitude;
            var temp = data.cargo_status.current_temp;
            var isAlert = data.cargo_status.is_alert;

            // 动态生成 HTML 标签内容
            var tempClass = isAlert ? "temp-alert" : "temp-normal";
            var markerContent = `
                <div class="truck-marker">
                    <div class="truck-icon">🚚</div>
                    <div>订单: ${orderId}</div>
                    <div class="${tempClass}">${temp} ℃ ${isAlert ? '(异常)' : ''}</div>
                </div>
            `;

            if (truckMarkers[orderId]) {
                // 车辆已存在，平滑移动位置并更新内容
                var marker = truckMarkers[orderId];
                marker.setContent(markerContent);
                // 使用高德地图的平滑移动动画
                marker.moveTo([lng, lat], {
                    duration: 1000,
                    autoRotation: true
                });
            } else {
                // 新车辆，创建 Marker
                var marker = new AMap.Marker({
                    position: [lng, lat],
                    content: markerContent,
                    offset: new AMap.Pixel(-50, -50) // 偏移量，使图标居中指向坐标
                });
                marker.setMap(map);
                truckMarkers[orderId] = marker;
                
                // 视角自适应
                map.setFitView([marker]);
            }
        } catch (e) {
            console.error("解析车辆数据失败: ", e);
        }
    }

    // 用于测试的临时函数（可删除）
    function simulateMove() {
        var testJson = {
            "order_id": "ORD_TEST_001",
            "location": { "longitude": 116.407 + Math.random()*0.1, "latitude": 39.904 + Math.random()*0.1 },
            "cargo_status": { "current_temp": (4.0 + Math.random()).toFixed(1), "is_alert": Math.random() > 0.8 }
        };
        updateTruckData(JSON.stringify(testJson));
    }
</script>
</body>
</html>
